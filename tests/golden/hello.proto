// hello.proto: generated by ashc emit-proto, do not edit.
// Every pledge is its own typed rpc, so a consumer gets the contract's
// argument and result types from protoc alone, with no generic Value
// envelope and no language side dispatch on a pledge name string. The
// session wrapper emitted beside this file carries the one thing protoc
// cannot, the stream whose lifetime is the instance's.

syntax = "proto3";
package ashford.hello;

// The Go package the emitted session wrapper lives in; a consumer that
// lays its module out differently overrides this with protoc's M flags.
option go_package = "ashbridge/hellopb";

// contract Greeter, version 1, shape 0x80464bf23398ab38.
// The sign surface: one optional field per vow, and the shape check,
// where 0 skips it and the wrapper's pinned hash enforces this build.
message SignRequest {
  optional string prefix = 1;  // the vow; unset takes the declared default
  uint64 expected_hash = 2;
}

// The signature: the id the pledge rpcs are keyed by, the effective vows
// after defaults and overrides, and the hash and timestamp an in process
// host reads off the handle.
message Signed {
  uint64 instance_id = 1;
  string prefix = 2;
  uint64 shape_hash = 3;
  int64 signed_at = 4;
}

// What the session stream carries. Signed is the first event; the stream's
// other job is holding the session open, and anything a server later needs
// to push arrives as another arm.
message SessionEvent {
  oneof event {
    Signed signed = 1;
  }
}

// The declared sum GreetError: every arm is bare, so it crosses as an
// enum whose numbering is the declared arm order, the ABI's own tag space.
enum GreetError {
  GREET_ERROR_EMPTY = 0;
}

// Result<String, GreetError>: the contract's own Err is a value, not a
// transport error.
message StringGreetErrorResult {
  oneof result {
    string ok = 1;
    GreetError err = 2;
  }
}

message GreetRequest {
  uint64 instance_id = 1;
  string name = 2;
}

message ShoutRequest {
  uint64 instance_id = 1;
  string name = 2;
}

// The lifecycle states, ASH_UNSIGNED through ASH_BROKEN, in the runtime's
// own numbering.
enum ContractState {
  UNSIGNED = 0;
  SIGNED = 1;
  FULFILLED = 2;
  PARTIAL = 3;
  BROKEN = 4;
}

message PledgeError { string pledge = 1; int64 err = 2; }

message PartialRequest { uint64 instance_id = 1; }

// The partial surface, name lists in the runtime's insertion order.
// repeated, not map, so the order Ashford pins as normative survives the
// wire.
message PartialReply {
  ContractState state = 1;
  repeated string fulfilled = 2;
  repeated string pending = 3;
  repeated string broken = 4;
  repeated PledgeError errors = 5;
}

message BreakRequest { uint64 instance_id = 1; }
message BreakReply {}

service Greeter {
  // Signs, then holds. The first event carries the signature; the stream
  // then stays open and empty for as long as the instance lives. Ending the
  // stream, by close, by cancel, or by dying, ends the instance.
  rpc Session(SignRequest) returns (stream SessionEvent);
  rpc Greet(GreetRequest) returns (StringGreetErrorResult);
  rpc Shout(ShoutRequest) returns (StringGreetErrorResult);
  rpc GetPartial(PartialRequest) returns (PartialReply);
  rpc Break(BreakRequest) returns (BreakReply);
}
