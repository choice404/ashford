// ledger.proto: generated by ashc emit-proto, do not edit.
// Every pledge is its own typed rpc, so a consumer gets the contract's
// argument and result types from protoc alone, with no generic Value
// envelope and no language side dispatch on a pledge name string. The
// session wrapper emitted beside this file carries the one thing protoc
// cannot, the stream whose lifetime is the instance's.

syntax = "proto3";
package ashford.ledger;

// The Go package the emitted session wrapper lives in; a consumer that
// lays its module out differently overrides this with protoc's M flags.
option go_package = "ashbridge/ledgerpb";

// contract Ledger, version 1, shape 0x663f8becc0eb3059.
// The sign surface: one optional field per vow, and the shape check,
// where 0 skips it and the wrapper's pinned hash enforces this build.
message SignRequest {
  optional string dsn = 1;  // the vow; unset takes the declared default
  uint64 expected_hash = 2;
}

// The signature: the id the pledge rpcs are keyed by, the effective vows
// after defaults and overrides, and the hash and timestamp an in process
// host reads off the handle.
message Signed {
  uint64 instance_id = 1;
  string dsn = 2;
  uint64 shape_hash = 3;
  int64 signed_at = 4;
  string park_token = 5;  // the resume key a park enabled server issues; empty when parking is off
}

// What the session stream carries. Signed is the first event; the stream's
// other job is holding the session open, and anything a server later needs
// to push arrives as another arm.
message SessionEvent {
  oneof event {
    Signed signed = 1;
  }
}

// The resume call: the token names a parked row on the server's park
// store, and a 0 expected_hash skips the shape check the way sign's does.
message ResumeRequest {
  string park_token = 1;
  uint64 expected_hash = 2;
}

// The declared sum LedgerError: every arm is bare, so it crosses as an
// enum whose numbering is the declared arm order, the ABI's own tag space.
enum LedgerError {
  LEDGER_ERROR_NO_SUCH_ACCOUNT = 0;
  LEDGER_ERROR_STORE_FAILED = 1;
  LEDGER_ERROR_INSUFFICIENT = 2;
}

// Result<Float, LedgerError>: the contract's own Err is a value, not a
// transport error.
message FloatLedgerErrorResult {
  oneof result {
    double ok = 1;
    LedgerError err = 2;
  }
}

// Result<Bool, LedgerError>: the contract's own Err is a value, not a
// transport error.
message BoolLedgerErrorResult {
  oneof result {
    bool ok = 1;
    LedgerError err = 2;
  }
}

// Result<Int, LedgerError>: the contract's own Err is a value, not a
// transport error.
message IntLedgerErrorResult {
  oneof result {
    int64 ok = 1;
    LedgerError err = 2;
  }
}

// Result<String, LedgerError>: the contract's own Err is a value, not a
// transport error.
message StringLedgerErrorResult {
  oneof result {
    string ok = 1;
    LedgerError err = 2;
  }
}

// The Ok of a pledge that answers with nothing; the message is the value.
message Unit {}

// Result<Unit, LedgerError>: the contract's own Err is a value, not a
// transport error.
message UnitLedgerErrorResult {
  oneof result {
    Unit ok = 1;
    LedgerError err = 2;
  }
}

message BalanceRequest {
  uint64 instance_id = 1;
  int64 id = 2;
}

message OpenRequest {
  uint64 instance_id = 1;
  int64 id = 2;
  string owner = 3;
  double amount = 4;
}

message SetBalanceRequest {
  uint64 instance_id = 1;
  int64 id = 2;
  string owner = 3;
  double amount = 4;
}

message OwnedTotalRequest {
  uint64 instance_id = 1;
  string owner = 2;
}

message RichRequest {
  uint64 instance_id = 1;
  double min = 2;
}

message OwnedAboveRequest {
  uint64 instance_id = 1;
  string owner = 2;
  double min = 3;
}

message OwnersAscRequest {
  uint64 instance_id = 1;
  double min = 2;
}

message OwnersDescRequest {
  uint64 instance_id = 1;
  double min = 2;
}

message TopOwnerRequest {
  uint64 instance_id = 1;
  double min = 2;
}

message TopOwnersRequest {
  uint64 instance_id = 1;
  double min = 2;
  int64 k = 3;
}

message DebitRequest {
  uint64 instance_id = 1;
  int64 id = 2;
  double amount = 3;
}

message CreditRequest {
  uint64 instance_id = 1;
  int64 id = 2;
  double amount = 3;
}

// The lifecycle states, ASH_UNSIGNED through ASH_BROKEN, in the runtime's
// own numbering.
enum ContractState {
  UNSIGNED = 0;
  SIGNED = 1;
  FULFILLED = 2;
  PARTIAL = 3;
  BROKEN = 4;
}

message PledgeError { string pledge = 1; int64 err = 2; }

message PartialRequest { uint64 instance_id = 1; }

// The partial surface, name lists in the runtime's insertion order.
// repeated, not map, so the order Ashford pins as normative survives the
// wire.
message PartialReply {
  ContractState state = 1;
  repeated string fulfilled = 2;
  repeated string pending = 3;
  repeated string broken = 4;
  repeated PledgeError errors = 5;
}

message BreakRequest { uint64 instance_id = 1; }
message BreakReply {}

service Ledger {
  // Signs, then holds. The first event carries the signature; the stream
  // then stays open and empty for as long as the instance lives. Ending the
  // stream, by close, by cancel, or by dying, ends the instance.
  rpc Session(SignRequest) returns (stream SessionEvent);
  // A parked instance stood back up: the stream is once again the
  // instance's life, and its first event carries the signature.
  rpc Resume(ResumeRequest) returns (stream SessionEvent);
  rpc Balance(BalanceRequest) returns (FloatLedgerErrorResult);
  rpc Open(OpenRequest) returns (BoolLedgerErrorResult);
  rpc SetBalance(SetBalanceRequest) returns (BoolLedgerErrorResult);
  rpc OwnedTotal(OwnedTotalRequest) returns (FloatLedgerErrorResult);
  rpc Rich(RichRequest) returns (IntLedgerErrorResult);
  rpc OwnedAbove(OwnedAboveRequest) returns (FloatLedgerErrorResult);
  rpc OwnersAsc(OwnersAscRequest) returns (StringLedgerErrorResult);
  rpc OwnersDesc(OwnersDescRequest) returns (StringLedgerErrorResult);
  rpc TopOwner(TopOwnerRequest) returns (StringLedgerErrorResult);
  rpc TopOwners(TopOwnersRequest) returns (StringLedgerErrorResult);
  rpc Debit(DebitRequest) returns (UnitLedgerErrorResult);
  rpc Credit(CreditRequest) returns (UnitLedgerErrorResult);
  rpc GetPartial(PartialRequest) returns (PartialReply);
  rpc Break(BreakRequest) returns (BreakReply);
}
